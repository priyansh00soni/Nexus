services:
  postgres:
    image: postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: always

  redis:
    image: redis
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    restart: always

  api:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: always
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: node dist/worker.js
    env_file:
      - .env
    restart: always
    depends_on:
      - postgres
      - redis
    
volumes:
  postgres_data:
  redis_data:

  