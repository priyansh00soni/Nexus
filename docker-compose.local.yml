services:
  postgres:
    image: postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: always

  redis:
    image: redis
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    restart: always

  api:
    build: .
    env_file:
      - .env
    environment:
      START_WORKERS_IN_API: "false" # worker-1/worker-2 containers handle jobs here
    ports:
      - "8000:8000"
    restart: always
    depends_on:
      - postgres
      - redis

  worker-1:
    build: .
    command: node dist/worker.js
    environment:
      WORKER_ID: worker-1
    env_file:
      - .env
    ports:
      - "9101:9101"
    depends_on:
      - postgres
      - redis
    restart: always

  worker-2:
    build: .
    command: node dist/worker.js
    environment:
      WORKER_ID: worker-2
    env_file:
      - .env
    ports:
      - "9102:9101"
    depends_on:
      - postgres
      - redis
    restart: always

  worker-3:
    build: .
    command: node dist/worker.js
    environment:
      WORKER_ID: worker-3
    env_file:
      - .env
    ports:
      - "9103:9101"
    depends_on:
      - postgres
      - redis
    restart: always

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.local.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - api
    restart: always

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    restart: always
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:


  # run in local with - docker compose -f docker-compose.local.yml up -d --build